[advisories]
unmaintained = "workspace"
yanked = "warn"

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "Zlib",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
