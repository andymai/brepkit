name: Release & Publish

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['release_created'] }}
      tag_name: ${{ steps.release.outputs['tag_name'] }}
      prs_created: ${{ steps.release.outputs['prs_created'] }}
      pr: ${{ steps.release.outputs['pr'] }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BREPKIT_BOT_APP_ID }}
          private-key: ${{ secrets.BREPKIT_BOT_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  auto-merge:
    name: Auto-merge Release PR
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BREPKIT_BOT_APP_ID }}
          private-key: ${{ secrets.BREPKIT_BOT_PRIVATE_KEY }}
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          if [ -n "$PR_JSON" ] && [ "$PR_JSON" != "null" ]; then
            pr_number=$(echo "$PR_JSON" | jq -r '.number')
            if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
              echo "Enabling auto-merge for PR #$pr_number"
              gh pr merge "$pr_number" --auto --squash --repo "$GITHUB_REPOSITORY"
            fi
          fi

  publish:
    name: Build WASM & Publish
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: wasm-pack build crates/wasm --target bundler --release

      - name: Set package name
        working-directory: crates/wasm/pkg
        run: npm pkg set name="@andymai/brepkit-wasm"

      - name: Verify version
        working-directory: crates/wasm/pkg
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "Publishing @andymai/brepkit-wasm@$PKG_VERSION"
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}

      - name: Publish to npm
        working-directory: crates/wasm/pkg
        run: npm publish --provenance --access public
